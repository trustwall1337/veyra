# Veyra rule — supplementary to gitleaks (cc-11-8 supplementary).
#
# Heuristic: a hardcoded Slack or Discord webhook URL. Webhook URLs are
# bearer tokens — anyone with the URL can post to the channel. They are
# not always picked up by gitleaks' general secret patterns because the
# URL itself doesn't look like a high-entropy key.
#
# This rule is a supplementary check for non-credential secrets per
# step 07 What-Lands. Severity maps to evidence_strength only.
rules:
  - id: hardcoded-webhook-url
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      control_id: cc-11-8-supplementary
      veyra_phase: 1
    message: |
      Hardcoded webhook URL detected. Webhook URLs are bearer tokens —
      treat them as secrets and load from environment instead of the
      source tree.
    pattern-regex: 'https?://(hooks\.slack\.com/services/|discord(app)?\.com/api/webhooks/)[A-Za-z0-9/_-]+'
